name: tabz
description: "A collaborative expense splitter that reads your receipts and divides the bill your way—equally, by item, or by percentage."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  provider: ^6.1.2
  intl: ^0.20.2
  stacked_card_carousel: ^0.0.4
  flutter_svg: ^2.3.0
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  google_sign_in: ^6.2.0
  image_picker: ^1.1.2
  permission_handler: ^12.0.2
  path_provider: ^2.1.4
  google_mlkit_text_recognition: ^0.15.1
  google_generative_ai: ^0.4.7
  flutter_dotenv: ^6.0.1
  flutter_slidable: ^4.0.3
  shared_preferences: ^2.5.5
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true

  image_path: "assets/icon/logo.png"

  adaptive_icon_foreground: "assets/icon/tabz.png"
  adaptive_icon_background: "#F9F2EF"

flutter:
  uses-material-design: true
  assets:
    - .env
    - lib/assets/icon/tabz.png
    - lib/assets/avatars/


